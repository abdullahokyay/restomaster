<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RestoMaster | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">☕ RestoMaster Dashboard</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-8">
            <h3>Günün Menüsü</h3>
            <div class="row">
                <div th:each="item : ${items}" class="col-md-6 mb-3">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${item.name}">Ürün</h5>
                            <p class="card-text text-muted" th:text="${item.description}">Açıklama</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fw-bold" th:text="${item.price + ' TL'}">0 TL</span>
                                <a th:href="@{'/item/' + ${item.id}}" class="btn btn-primary btn-sm">İncele</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <h3>Masalar</h3>
            <div class="row">
                <div th:each="t : ${tables}" class="col-6 mb-2 text-center">
                    <div th:class="${t.isOccupied} ? 'p-3 bg-danger text-white rounded' : 'p-3 bg-success text-white rounded'">
                        Masa <span th:text="${t.tableNumber}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
